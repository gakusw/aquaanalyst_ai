<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const img = new Image();
        img.src = 'file:///C:/development/develop/aquaanalyst_ai/assets/images/app_icon.png';
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 0) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            const width = maxX - minX + 1;
            const height = maxY - minY + 1;
            
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = width;
            cropCanvas.height = height;
            const cropCtx = cropCanvas.getContext('2d');
            cropCtx.drawImage(img, minX, minY, width, height, 0, 0, width, height);
            
            const base64 = cropCanvas.toDataURL('image/png');
            console.log('BASE64_START' + base64 + 'BASE64_END');
            
            // Also display it for visual confirmation if needed
            document.body.appendChild(cropCanvas);
        };
    </script>
</body>
</html>
